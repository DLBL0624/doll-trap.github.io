<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Doll Trap</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <!-- Header -->
    <header>
      DOLL TRAP
    </header>

    <!-- Navigation -->
    <nav>
      <a href="index.html">Home</a>
      <a href="members.html">Members</a>
      <a href="calendar.html">Calendar</a>
      <a href="gallery.html">Gallery</a>
      <a href="#contact">Contact</a>
    </nav>

    <!-- Gallery Section -->
    <div class="gallery-container">
      <h1>Gallery</h1>

      <div class="filter-section">
        <div class="filter-group">
          <h3>Category</h3>
          <div class="gallery-filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="performance">Performance</button>
            <button class="filter-btn" data-filter="rehearsal">Rehearsal</button>
            <button class="filter-btn" data-filter="photoshoot">Photoshoot</button>
          </div>
        </div>

        <div class="filter-group">
          <h3>Member</h3>
          <div class="member-filters">
            <button class="member-filter-btn active" data-member="all">All Members</button>
            <button class="member-filter-btn" data-member="buzzly">Buzzly (Pink)</button>
            <button class="member-filter-btn" data-member="kokona">Kokona (Blue)</button>
            <button class="member-filter-btn" data-member="hitomi">Hitomi (Red)</button>
          </div>
        </div>

        <div class="filter-group">
          <h3>Event</h3>
          <div class="event-filters">
            <button class="event-filter-btn active" data-event="all">All Events</button>
            <button class="event-filter-btn" data-event="xama">XAMA Live House</button>
            <button class="event-filter-btn" data-event="sakuracon">Sakuracon</button>
            <button class="event-filter-btn" data-event="convention">Convention</button>
            <button class="event-filter-btn" data-event="live">Live Event</button>
          </div>
        </div>
      </div>

      <!-- XAMA Live House Performance Photos -->
      <div class="gallery-event" data-category="performance" data-event="xama">
        <h2 class="event-title">XAMA Live House Performance 2026</h2>
        <div class="gallery-grid">
          <div class="gallery-item" data-member="all">
            <img src="images/xama/xama-1.jpg" alt="XAMA Live House Photo 1">
            <p class="photo-member">Group</p>
          </div>
          <div class="gallery-item" data-member="all">
            <img src="images/xama/xama-2.jpg" alt="XAMA Live House Photo 2">
            <p class="photo-member">Group</p>
          </div>
          <div class="gallery-item" data-member="all">
            <img src="images/xama/xama-3.jpg" alt="XAMA Live House Photo 3">
            <p class="photo-member">Group</p>
          </div>
          <div class="gallery-item" data-member="all">
            <img src="images/xama/xama-4.jpg" alt="XAMA Live House Photo 4">
            <p class="photo-member">Group</p>
          </div>
          <div class="gallery-item" data-member="all">
            <img src="images/xama/xama-5.jpg" alt="XAMA Live House Photo 5">
            <p class="photo-member">Group</p>
          </div>
          <div class="gallery-item" data-member="all">
            <img src="images/xama/xama-6.jpg" alt="XAMA Live House Photo 6">
            <p class="photo-member">Group</p>
          </div>
        </div>
      </div>

      <!-- SKBY × HCCA Spring Festival Performance Photos -->
      <div class="gallery-event" data-category="performance" data-event="xama">
        <h2 class="event-title">SKBY × HCCA Spring Festival</h2>
        <div class="gallery-grid">
          <div class="gallery-item" data-member="all">
            <img src="images/SpFes/sp-1.jpg" alt="XAMA Live House Photo 1">
            <p class="photo-member">Group</p>
          </div>
          <div class="gallery-item" data-member="all">
            <img src="images/SpFes/sp-2.jpg" alt="XAMA Live House Photo 2">
            <p class="photo-member">Group</p>
          </div>
          <div class="gallery-item" data-member="all">
            <img src="images/SpFes/sp-3.jpg" alt="XAMA Live House Photo 3">
            <p class="photo-member">Group</p>
          </div>
          <div class="gallery-item" data-member="all">
            <img src="images/SpFes/sp-4.jpg" alt="XAMA Live House Photo 4">
            <p class="photo-member">Group</p>
          </div>
        </div>
      </div>


    <!-- Footer -->
    <footer>
      Follow us on Instagram / Xiaohongshu / YouTube
    </footer>

    <!-- Image Zoom Modal -->
    <div id="imageModal" class="image-modal">
      <span class="close">&times;</span>
      <img id="modalImage" src="" alt="Zoomed Image">
    </div>

    <script>
      // Image zoom functionality
      const modal = document.getElementById('imageModal');
      const modalImg = document.getElementById('modalImage');
      const closeBtn = document.querySelector('.close');
      const galleryImages = document.querySelectorAll('.gallery-item img');

      galleryImages.forEach(img => {
        img.addEventListener('click', () => {
          modal.style.display = 'block';
          modalImg.src = img.src;
        });
      });

      closeBtn.addEventListener('click', () => {
        modal.style.display = 'none';
      });

      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.style.display = 'none';
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          modal.style.display = 'none';
        }
      });

      // Filter variables
      let activeCategory = 'all';
      let activeMember = 'all';
      let activeEvent = 'all';

      const galleryEvents = document.querySelectorAll('.gallery-event');
      const categoryBtns = document.querySelectorAll('.filter-btn');
      const memberBtns = document.querySelectorAll('.member-filter-btn');
      const eventBtns = document.querySelectorAll('.event-filter-btn');

      // Category filter
      categoryBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          categoryBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeCategory = btn.getAttribute('data-filter');
          applyFilters();
        });
      });

      // Member filter
      memberBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          memberBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeMember = btn.getAttribute('data-member');
          applyFilters();
        });
      });

      // Event filter
      eventBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          eventBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeEvent = btn.getAttribute('data-event');
          applyFilters();
        });
      });

      // Apply all filters
      function applyFilters() {
        galleryEvents.forEach(eventDiv => {
          let showEvent = true;

          // Check category filter
          if (activeCategory !== 'all') {
            if (eventDiv.getAttribute('data-category') !== activeCategory) {
              showEvent = false;
            }
          }

          // Check event filter
          if (activeEvent !== 'all') {
            if (eventDiv.getAttribute('data-event') !== activeEvent) {
              showEvent = false;
            }
          }

          // Show or hide the entire event section
          if (showEvent) {
            eventDiv.style.display = 'block';
            
            // Now filter gallery items within this event
            const items = eventDiv.querySelectorAll('.gallery-item');
            items.forEach(item => {
              let showItem = true;
              
              if (activeMember !== 'all') {
                if (item.getAttribute('data-member') !== activeMember && item.getAttribute('data-member') !== 'all') {
                  showItem = false;
                }
              }
              
              item.style.display = showItem ? 'block' : 'none';
            });
          } else {
            eventDiv.style.display = 'none';
          }
        });
      }

      // Optional: Add image modal/lightbox functionality
      const galleryItems = document.querySelectorAll('.gallery-item img');
      galleryItems.forEach(img => {
        img.addEventListener('click', function() {
          console.log('Image clicked:', this.alt);
        });
      });
    </script>
  </body>
</html>
